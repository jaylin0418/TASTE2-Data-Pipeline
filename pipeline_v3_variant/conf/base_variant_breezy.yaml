# Emotion names used by _load_emotion_reference_pool to classify ref audio files.
# Must match the filename prefixes in eleven_lab_emotion_dir (afraid_*, disgusted_*, etc.)
emotion:
  - angry
  - sad
  - happy
  - surprised
  - afraid
  - disgusted
  - whisper

stages: [scenario, system_prompt, dialogue, tts, huggingface]

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 1: SCENARIO GENERATION
# ═══════════════════════════════════════════════════════════════════════════
scenario:
  model: openai/gpt-4o-mini
  n: 1
  max_retries: 3
  out_file: ${data_root}/${mode_name}/${scenario.topic}${topic_folder_suffix}/txt/scenario/scenarios.json
  topic: Travel
  gen:
    max_tokens: 12000
    temperature: 0.9
    top_p: 0.9
  prompt: |
    你是一位擅長寫台灣日常情境的編劇。

    任務：以「{topic}」（主題說明：{topic_desc}）為主題，產生剛好 {n} 個多樣化的對話情境。
    語言：繁體中文（台灣用語），避免簡體字與中國用語（例如：打车、手机、身份证、小区、物业）。
    補充：{topic} 只是「分類名稱」；請不要在 description 內直接輸出英文的 domain 名稱（例如：不要出現 {topic} 這個英文字）。

    內容規則：
    - 每個情境 3–4 句，描述真實、合理、貼近日常的狀況與背景。
    - 使用者有一個與 {topic} 相關的問題/困擾/需求；代理人會提供協助。
    - 禁止出現任何實際對話內容（不要出現 User:/Agent: 或引號對話）。
    - 情境要有差異（人物身分、時間壓力、費用、地點、資源限制、突發狀況、規則/流程等）。
    - 【硬性】盡量避免不必要的英文字母與阿拉伯數字；必要時改用中文口語寫法。
    - 【硬性】不要出現網址、Email、帳號/代碼、序號、英數混雜型縮寫。

    輸出格式（必須嚴格遵守）：
    - 只能輸出「純 JSON」一個物件；不要輸出任何解釋、不要用 code block。
    - 頂層只能有 key："scenarios"。
    - "scenarios" 是陣列，長度必須等於 {n}。
    - 每個元素必須是只含一個 key 的物件，key 需從 scenario1 連號到 scenario{n}（不可缺漏）。
    - 每個 scenario 物件必須包含 description 字串；description 內不可包含換行字元。

    JSON 形狀（示意，請照此結構輸出）：
    {{
    "scenarios": [
      {{
        "scenario1": {{
          "description": "（此處填入情境描述：3–4 句、貼近台灣日常、與主題相關；不要換行）"
        }}
      }}
    ]
    }}

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 1.5: SCENARIO-LEVEL SYSTEM PROMPT GENERATION
# ═══════════════════════════════════════════════════════════════════════════
system_prompt:
  model: openai/gpt-4o-mini
  gen:
    max_tokens: 512
    temperature: 0.7
    top_p: 0.9
  prompt: |
    你是一位擅長寫台灣日常口語對話的編劇與提示詞工程師。

    任務：給你一個對話 scenario（JSON，含 id/description），請輸出一段「system prompt」
    用來引導後續 LLM 生成該情境的多輪對話。

    輸出規則（超硬性，違反即錯）：
    - 只輸出 system prompt 文字本體；不要前言、不要標籤、不要 code block、不要 JSON。
    - 最多三句話，內容精準、可操作。
    - 語言：繁體中文（台灣用語），避免簡體字與中國用語（如：地铁、公交、网约车、微信、支付宝）。
    - 系統提示必須強調：每一行（每個 turn）就是一個句子，六十五個中文字內、二十二秒內可口說完；超過就刪短。
    - 提醒角色與互動目標：使用者有困擾/需求，代理人務實協助並追問必要資訊。

    請根據 scenario description 量身寫出 system prompt。

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 2: DIALOGUE GENERATION (neutral base — no control injection)
# ═══════════════════════════════════════════════════════════════════════════
dialogue:
  user_model: meta-llama/llama-3.3-70b-instruct
  agent_model: openai/gpt-4o-mini

  max_retries: 3

  user_gen:
    max_tokens: 256
    temperature: 0.9
    top_p: 0.9
  agent_gen:
    max_tokens: 512
    temperature: 0.8
    top_p: 0.9

  min_turns: 6
  max_turns: 8
  per_scenario: 1
  out_dir: ${data_root}/${mode_name}/${scenario.topic}${topic_folder_suffix}/txt/dialogue

  user_prompt: |
    你是使用者，正在就情境向代理人求助。
    語言：繁體中文台灣口語，避免簡體字與中國用語。

    輸出格式（超硬性）：
    - 只輸出一行一句；六十五個中文字內；二十二秒內可口說完，超過即刪短再輸出。
    - 不要加 User:；不要旁白/動作；不要任何標頭。
    - 禁止 Markdown/條列；不要網址、Email、帳號/代碼、序號。
    - 盡量不用英文字母或阿拉伯數字；儘量不要使用英文詞語，改用中文表達。

  agent_prompt: |
    角色：你是代理人（Agent），一位說台式中文的助理，直接切入重點、給出可執行的建議並追問必要資訊。
    語言：繁體中文台灣口語，避免簡體字與中國用語。

    每回合一個重點：一句話內做到「確認/同理＋一個下一步＋一個追問」。

    輸出格式（超硬性）：
    - 只輸出一行一句；六十五個中文字內；二十二秒內講完，超過即刪短再輸出。
    - 不要加 Agent:；不要旁白/動作；不要任何標頭。
    - 禁止 Markdown/條列；不要網址、Email、帳號/代碼、序號。
    - 盡量不用英文字母或阿拉伯數字；不要使用英文詞語，一律改用中文表達。


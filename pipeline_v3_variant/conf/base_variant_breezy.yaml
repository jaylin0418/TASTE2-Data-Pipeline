# ═══════════════════════════════════════════════════════════════════════════
# VARIANT DATASET GENERATION PIPELINE (BreezyVoice)
# ═══════════════════════════════════════════════════════════════════════════
# Each scenario produces 10 dialogues sharing the same base conversation:
#   1 neutral (no control) + 9 controlled variants
#   (speed_slow, speed_fast, emotion_sad/happy/surprised/fear/disgust/angry, whisper)
#
# LLM runs once per scenario to generate the neutral base; the 9 variants are
# derived by injecting a user request phrase at turn pair 0 or 1.
# ═══════════════════════════════════════════════════════════════════════════

hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false

device: cuda

run_root: null

data_root: TEST_syn_variant

mode_name: variant

topic_folder_suffix: ""

# Enable variant mode (neutral base + N controlled variants)
variants_mode: true

# Which turn pair (0-indexed) to inject the control request.
# 0 = first user turn, 1 = second user turn (randomly chosen).
injection_pair_choices: [0, 1]

batch_run:
  topic: ${scenario.topic}
  batch_size: ${scenario.n}
  total_count: ${scenario.n}
  final_huggingface_only: true

multi_topic_run:
  output_root_base: /work/${oc.env:USER,user}
  workers: 2
  per_topic_count: 130
  batch_size: 10
  final_huggingface_only: true
  topics:
    - Art
    - Books
    - Cars
    - Celebrities
    - Coding
    - Cooking
    - Education
    - Events
    - Fashion
    - Fitness
    - Finance
    - Food
    - Gaming
    - Gardening
    - Health
    - History
    - Hobbies
    - Holidays
    - Home
    - Languages
    - Makeup
    - Movies
    - Music
    - Nature
    - News
    - Pets
    - Philosophy
    - Photography
    - Podcasts
    - Politics
    - Relationships
    - Science
    - Shopping
    - Social Media
    - Spirituality
    - Sports
    - Technology
    - Traditions
    - Travel
    - Weather
    - Work

# ═══════════════════════════════════════════════════════════════════════════
# VARIANT DEFINITIONS
# 9 controlled variants derived from the neutral base dialogue.
# Each variant specifies: dim, value, fn (post-processing), and user_requests.
# ═══════════════════════════════════════════════════════════════════════════
variants:
  speed_slow:
    dim: speed
    value: slow
    fn: time_stretch
    factor: 0.70
    user_requests:
      - "你可以說話慢一點嗎，我想聽清楚"
      - "麻煩你講慢一點，我有點跟不上"
      - "你說話速度可以放慢一些嗎"
      - "說話慢一點好嗎，我在做筆記"
      - "能不能稍微放慢語速，我想仔細理解"
      - "你說話慢一點可以嗎，我耳朵不太好"
      - "語速可以放慢一點嗎，我在學習"
      - "你說話速度稍微慢一點可以嗎"
      - "麻煩說得慢一點，我想每個字都聽清楚"
      - "說話速度慢一點好嗎，我想跟上你的節奏"
      - "你能不能放慢一點，我需要時間思考"
      - "慢慢說可以嗎，不用趕"

  speed_fast:
    dim: speed
    value: fast
    fn: time_stretch
    factor: 1.38
    user_requests:
      - "你可以說話快一點嗎，我有點趕時間"
      - "麻煩說快一點，我時間不多"
      - "說話快一點好嗎，省點時間"
      - "能不能加快語速，我很趕"
      - "你說話可以稍微快一些嗎"
      - "講快一點可以嗎，我趕著去開會"
      - "語速快一點好嗎，我知道大概就好"
      - "你可以加快一點說話嗎，謝謝"
      - "說快點好嗎，我待會有事"
      - "麻煩加快語速，我想快點聽完"
      - "你能說快一點嗎，我趕時間"
      - "快一點講好嗎，重點就好"

  emotion_sad:
    dim: emotion
    value: sad
    fn: ref_audio
    user_requests:
      - "你可以用難過的語氣跟我說話嗎"
      - "麻煩用比較悲傷的口吻回答我"
      - "你說話可以感覺悲傷一點嗎"
      - "我希望你用憂鬱的語調說話"
      - "能不能用難過的感覺跟我說"
      - "你說話語氣可以悲傷一些嗎"
      - "麻煩用低落的語氣跟我說話"
      - "說話聽起來難過一點好嗎"
      - "我想聽你用傷心的語氣說話"
      - "你可以用沉重的語氣說話嗎"
      - "帶點哀傷的感覺說話可以嗎"
      - "你說話可以悲悲的嗎，我心情不好"

  emotion_happy:
    dim: emotion
    value: happy
    fn: ref_audio
    user_requests:
      - "你可以開心一點說話嗎"
      - "麻煩用愉快的語氣跟我說話"
      - "你說話可以感覺快樂一些嗎"
      - "說話開心一點好嗎，讓氣氛好一點"
      - "能不能用輕鬆愉快的口吻回答我"
      - "你語氣可以更歡樂一點嗎"
      - "麻煩用高興的語調說話"
      - "我想聽你用開心的語氣說話"
      - "你說話可以帶點雀躍感嗎"
      - "用快樂的感覺說話好嗎"
      - "你說話帶點笑意可以嗎"
      - "語氣開朗一點好嗎，讓我也開心一點"

  emotion_surprised:
    dim: emotion
    value: surprised
    fn: ref_audio
    user_requests:
      - "你可以用驚訝的語氣說話嗎"
      - "麻煩說話帶點驚訝的感覺"
      - "你說話可以聽起來很驚訝嗎"
      - "說話帶點驚奇感好嗎"
      - "能不能用吃驚的語氣跟我說話"
      - "你語氣可以表現出驚訝嗎"
      - "麻煩用驚喜的口吻說話"
      - "我想聽你用驚訝的語調說話"
      - "說話帶點沒想到的感覺好嗎"
      - "你可以用驚呼的語氣說嗎"
      - "語氣驚訝一點好嗎，讓我感受到你的反應"
      - "你說話像是很震驚的樣子可以嗎"

  emotion_fear:
    dim: emotion
    value: fear
    fn: ref_audio
    user_requests:
      - "你可以用害怕的語氣說話嗎"
      - "麻煩說話帶點緊張害怕的感覺"
      - "你說話可以聽起來很不安嗎"
      - "說話帶點恐懼感好嗎"
      - "能不能用膽怯的語氣跟我說話"
      - "你語氣可以表現出擔憂害怕嗎"
      - "麻煩用惶恐的口吻說話"
      - "我想聽你用害怕的語調說話"
      - "說話帶點顫抖緊張的感覺好嗎"
      - "你可以用忐忑不安的語氣說嗎"
      - "說話帶點戒慎恐懼的感覺好嗎"
      - "語氣可以緊張一點嗎，就像在怕什麼"

  emotion_disgust:
    dim: emotion
    value: disgust
    fn: ref_audio
    user_requests:
      - "你可以用厭惡的語氣說話嗎"
      - "麻煩說話帶點嫌棄的感覺"
      - "你說話可以聽起來很反感嗎"
      - "說話帶點不屑感好嗎"
      - "能不能用嫌惡的語氣跟我說話"
      - "你語氣可以表現出厭倦嗎"
      - "麻煩用反感的口吻說話"
      - "我想聽你用厭惡的語調說話"
      - "說話帶點嫌棄的感覺好嗎"
      - "你可以用不以為然的語氣說嗎"
      - "語氣帶點鄙視可以嗎"
      - "說話讓人感覺你很討厭這件事好嗎"

  emotion_angry:
    dim: emotion
    value: angry
    fn: ref_audio
    user_requests:
      - "你可以用生氣的語氣說話嗎"
      - "麻煩說話帶點憤怒的感覺"
      - "你說話可以聽起來很火大嗎"
      - "說話帶點不滿感好嗎"
      - "能不能用憤怒的語氣跟我說話"
      - "你語氣可以表現出生氣嗎"
      - "麻煩用氣憤的口吻說話"
      - "我想聽你用憤怒的語調說話"
      - "說話帶點不爽的感覺好嗎"
      - "你可以用義憤填膺的語氣說嗎"
      - "語氣激動一點可以嗎，就是那種很火的感覺"
      - "說話帶點怒氣好嗎"

  whisper:
    dim: whisper
    value: whisper
    fn: ref_audio
    user_requests:
      - "你可以用耳語的方式說話嗎"
      - "麻煩悄悄地跟我說話"
      - "你說話可以像在耳邊說悄悄話嗎"

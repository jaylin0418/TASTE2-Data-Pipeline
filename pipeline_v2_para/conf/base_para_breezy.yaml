# ═══════════════════════════════════════════════════════════════════════════
# PARALINGUISTIC CONTROL DATA GENERATION PIPELINE (BreezyVoice)
# ═══════════════════════════════════════════════════════════════════════════
# Generates dialogues where user requests voice changes (speed/volume/pitch/emotion).
# Symmetric pairs: each scenario produces one dialogue per control direction.
# ═══════════════════════════════════════════════════════════════════════════

hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false

device: cuda

run_root: null

data_root: TEST_syn_para

mode_name: para

topic_folder_suffix: ""

batch_run:
  topic: ${scenario.topic}
  batch_size: ${scenario.n}
  total_count: ${scenario.n}
  final_huggingface_only: true

multi_topic_run:
  output_root_base: /work/jaylin0418
  workers: 2
  per_topic_count: 130
  batch_size: 10
  final_huggingface_only: true
  topics:
    - Art
    - Books
    - Cars
    - Celebrities
    - Coding
    - Cooking
    - Education
    - Events
    - Fashion
    - Fitness
    - Finance
    - Food
    - Gaming
    - Gardening
    - Health
    - History
    - Hobbies
    - Holidays
    - Home
    - Languages
    - Makeup
    - Movies
    - Music
    - Nature
    - News
    - Pets
    - Philosophy
    - Photography
    - Podcasts
    - Politics
    - Relationships
    - Science
    - Shopping
    - Social Media
    - Spirituality
    - Sports
    - Technology
    - Traditions
    - Travel
    - Weather
    - Work

# ═══════════════════════════════════════════════════════════════════════════
# PARALINGUISTIC CONTROL DIMENSIONS
# Defines all control types, their post-processing parameters, and Chinese
# user request phrases. Each control_key maps to one folder suffix.
# ═══════════════════════════════════════════════════════════════════════════
para:
  # Which control dimensions to include. Remove any entry to disable that dim.
  enabled_dims:
    - speed
    - volume
    - pitch
    - emotion

  # Probability of a control request on the first eligible turn (turn pair 1+)
  control_request_frequency_first: 0.5
  # Probability on turn pairs 1+ when control has NOT yet happened (catch-up)
  control_request_frequency_catchup: 0.9
  # Probability of a control request on subsequent turns (after first control happened)
  # Set to 0.0 to enforce exactly one control per dialogue (sticky to end)
  control_request_frequency_subsequent: 0.0
  # Whether users can request returning to normal (disable to keep dims always active)
  allow_normal_reset: false

  # If true, each dialogue has at most one active control at a time (new control replaces old)
  single_control: false

  # Probability of resetting to normal when re-selecting an already-active dim
  normal_reset_prob:
    pitch: 0.4
    speed: 0.3
    volume: 0.3
    emotion: 0.3

  # Relative sampling weights for each control dimension (higher = more frequent)
  dim_weights:
    speed: 3
    volume: 3
    pitch: 3
    emotion: 3

  # All control dimensions with post-processing parameters
  dims:
    speed_very_fast:
      dim: speed
      value: very_fast
      fn: time_stretch
      factor: 1.5
      user_requests:
        - "你可以說話快很多嗎，我時間有點趕"
        - "麻煩你講快一點，越快越好"
        - "說話快一點好嗎，最好再快一些"
        - "能不能講話再快一些，我快沒時間了"
        - "你說話的速度可以再快很多嗎"
        - "講話超快一點好嗎，我需要趕快知道"
        - "麻煩加快很多，我很趕"
        - "說話速度可以快到最快嗎"
    speed_fast:
      dim: speed
      value: fast
      fn: time_stretch
      factor: 1.3
      user_requests:
        - "你可以說話快一點嗎"
        - "麻煩你講話稍微快一點"
        - "你說話可以快一點嗎，我有點趕"
        - "說話快一點好嗎"
        - "能不能稍微加快一點速度"
        - "你說話可以再快一些嗎"
        - "講話快一點可以嗎，省點時間"
        - "稍微快一點好嗎，謝謝"
        - "你可以加快語速嗎"
        - "麻煩說話快一點，我想快點聽完"
    speed_slow:
      dim: speed
      value: slow
      fn: time_stretch
      factor: 0.77
      user_requests:
        - "你可以說話慢一點嗎，我想聽清楚"
        - "麻煩你講慢一點，我聽不太清楚"
        - "你說話可以慢一點嗎"
        - "說話慢一點好嗎，我想仔細聽"
        - "能不能放慢一點速度"
        - "你可以說慢一些嗎，我在做筆記"
        - "講話慢一點可以嗎"
        - "稍微放慢語速好嗎"
        - "你說話速度可以慢一些嗎，我想跟上"
        - "麻煩說慢一點，我想每句都聽懂"
    speed_very_slow:
      dim: speed
      value: very_slow
      fn: time_stretch
      factor: 0.70
      user_requests:
        - "你可以說話很慢嗎，我想每個字都聽清楚"
        - "麻煩你講慢很多，我需要慢慢消化"
        - "你說話可以超慢嗎，我不太熟悉這些"
        - "說話慢很多好嗎，我在學習"
        - "能不能說得非常慢，我在抄寫"
        - "你可以放慢非常多嗎，我聽得有點吃力"
        - "講話慢很多可以嗎，一個字一個字來"
        - "說得超級慢一點好嗎，我需要仔細理解"
    volume_very_loud:
      dim: volume
      value: very_loud
      fn: volume_scale
      factor: 2.0
      user_requests:
        - "你聲音可以大很多嗎，我聽不太到"
        - "麻煩說大聲很多，我這裡有點吵"
        - "你可以聲音大一點嗎，越大越好"
        - "說話大聲一點好嗎，大很多"
        - "能不能超大聲，旁邊很吵"
        - "你聲音可以放到最大嗎，我幾乎聽不到"
        - "麻煩大聲非常多，環境太嘈雜了"
        - "說超大聲好嗎，我在戶外"
    volume_loud:
      dim: volume
      value: loud
      fn: volume_scale
      factor: 1.5
      user_requests:
        - "你聲音可以大一點嗎"
        - "麻煩說大聲一點，我這裡有點吵"
        - "你可以大聲一點嗎"
        - "說話大聲一點好嗎"
        - "能不能稍微大聲一點，我有點聽不清楚"
        - "你聲音可以稍微提高嗎"
        - "講大聲一點可以嗎"
        - "音量大一些好嗎"
        - "你可以把音量調大一點嗎"
        - "麻煩大聲一點，我耳機音量不夠"
    volume_quiet:
      dim: volume
      value: quiet
      fn: volume_scale
      factor: 0.4
      user_requests:
        - "你聲音可以小一點嗎"
        - "麻煩說小聲一點，我在安靜的地方"
        - "你可以輕聲一點嗎，旁邊有人睡覺"
        - "說話小聲一點好嗎"
        - "能不能小聲一些，這裡比較安靜"
        - "你聲音可以降低一點嗎"
        - "說輕一點好嗎，有人在休息"
        - "音量小一點可以嗎"
        - "你可以把聲音放低一點嗎"
        - "麻煩小聲說，我在辦公室"
    volume_very_quiet:
      dim: volume
      value: very_quiet
      fn: volume_scale
      factor: 0.15
      user_requests:
        - "你聲音可以很小聲嗎，我在圖書館"
        - "麻煩說超小聲，不能吵到別人"
        - "你可以幾乎悄悄地說嗎，有人在睡覺"
        - "說話小聲很多好嗎，我在安靜的場合"
        - "能不能非常小聲，旁邊有嬰兒在睡"
        - "你可以幾乎耳語嗎，這裡要保持安靜"
        - "講話超小聲可以嗎，我在考場外"
        - "聲音盡量壓低好嗎，不能有任何聲音"
    pitch_very_high:
      dim: pitch
      value: very_high
      fn: pitch_shift
      semitones: 6
      user_requests:
        - "你聲調可以高很多嗎，越高越好"
        - "麻煩音調拉高很多，我覺得這樣聽起來比較有趣"
        - "你音調可以非常高嗎"
        - "說話音調高很多好嗎，盡量高"
        - "能不能把音調提高非常多"
        - "你可以用很高的音調說話嗎，越高越好"
        - "聲調超高一點好嗎，我想聽看看"
        - "麻煩音調高到最高，謝謝"
    pitch_high:
      dim: pitch
      value: high
      fn: pitch_shift
      semitones: 3
      user_requests:
        - "你聲調可以高一點嗎"
        - "麻煩你用高一點的音調說話"
        - "你說話音調可以高一點嗎，聽起來比較清亮"
        - "聲音高一點好嗎，聽起來輕柔一些"
        - "能不能把音調提高一點"
        - "你音調可以再高一些嗎，感覺比較活潑"
        - "說話音調高一點好嗎"
        - "可以用高音調說話嗎，我覺得比較好聽"
        - "麻煩音調高一點，聽起來比較清晰"
        - "你可以把聲調拉高一點嗎"
    pitch_low:
      dim: pitch
      value: low
      fn: pitch_shift
      semitones: -3
      user_requests:
        - "你聲調可以低一點嗎"
        - "麻煩你用低一點的音調說話"
        - "你說話音調可以低一點嗎，聽起來比較沉穩"
        - "聲音低一點好嗎，聽起來比較放鬆"
        - "能不能把音調降低一點"
        - "你音調可以再低一些嗎，感覺比較穩重"
        - "說話音調低一點好嗎"

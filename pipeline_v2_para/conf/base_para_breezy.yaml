        - "你可以把聲調壓低一點嗎"
    pitch_very_low:
      dim: pitch
      value: very_low
      fn: pitch_shift
      semitones: -6
      user_requests:
        - "你聲調可以低很多嗎，越低越好"
        - "麻煩音調降低很多，聽起來比較深沉"
